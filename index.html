<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Area Tactics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: sans-serif; }
    #canvas-container { position: fixed; inset: 0; bottom: clamp(90px, 15vh, 140px); }

    /* ── HUD ── */
    #hud {
      position: fixed; top: 12px; right: 12px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
      z-index: 10; pointer-events: none;
    }
    #turn-display {
      color: #ddeeff; font: bold 15px/1.4 sans-serif;
      background: rgba(0,0,0,0.65); padding: 6px 14px;
      border-radius: 5px; border: 1px solid #334466;
    }
    #end-turn-btn {
      pointer-events: all; color: #ddeeff; font: bold 14px sans-serif;
      background: #1e3a5a; border: 1px solid #5577aa;
      padding: 8px 18px; border-radius: 5px; cursor: pointer;
    }
    #manual-btn {
      pointer-events: all; color: #7799bb; font: bold 14px sans-serif;
      background: rgba(0,0,0,0.5); border: 1px solid #334466;
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; align-self: flex-end;
    }
    #manual-btn:hover { color: #aaccff; border-color: #5577aa; background: #1e3a5a; }
      pointer-events: all; color: #ddeeff; font: bold 14px sans-serif;
      background: #1e3a5a; border: 1px solid #5577aa;
      padding: 8px 18px; border-radius: 5px; cursor: pointer;
    }
    #load-display {
      color: #ddeeff; font: 12px/1.6 monospace;
      background: rgba(0,0,0,0.65); padding: 4px 14px;
      border-radius: 5px; border: 1px solid #334466;
    }
    #load-display .p1 { color: #5588ff; }
    #load-display .p2 { color: #ff5555; }

    /* ── shared full-screen overlay ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 20px; z-index: 20;
    }
    .overlay.visible { display: flex; }

    /* ── game-over ── */
    #game-over h2 { color: #fff; font-size: 36px; }
    #back-btn {
      margin-top: 8px; padding: 12px 40px; font-size: 17px; font-weight: bold;
      background: #1e3a5a; color: #ddeeff; border: 1px solid #5577aa;
      border-radius: 6px; cursor: pointer;
    }
    #back-btn:hover { background: #2a4d75; }
    #back-btn:active { background: #152a42; }

    /* ── new-game screen ── */
    #new-game { color: #ddeeff; }
    #new-game h1 { font-size: 30px; margin-bottom: 8px; text-align: center; }
    .ng-panel {
      background: rgba(255,255,255,0.05); border: 1px solid #334466;
      border-radius: 8px; padding: 18px 24px; min-width: 300px;
    }
    .ng-panel h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em;
                   color: #7799bb; margin-bottom: 12px; }
    .map-option {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; cursor: pointer;
    }
    .map-option input[type=radio] { accent-color: #3366ee; width: 16px; height: 16px; cursor: pointer; }
    .map-option label { cursor: pointer; font-size: 15px; }
    .feature-option {
      display: flex; align-items: center; gap: 10px; padding: 7px 0; cursor: pointer;
    }
    .feature-option.disabled { opacity: 0.4; cursor: not-allowed; }
    .feature-option input[type=checkbox] { width: 16px; height: 16px; accent-color: #3366ee; }
    .feature-option.disabled input[type=checkbox] { cursor: not-allowed; }
    .feature-option label { font-size: 15px; cursor: pointer; }
    .feature-option.disabled label { cursor: not-allowed; }
    .feature-tag {
      font-size: 11px; color: #7799bb; background: rgba(255,255,255,0.08);
      border-radius: 3px; padding: 1px 6px; margin-left: auto;
    }
    #start-btn {
      margin-top: 4px; padding: 12px 40px; font-size: 17px; font-weight: bold;
      background: #1e3a5a; color: #ddeeff; border: 1px solid #5577aa;
      border-radius: 6px; cursor: pointer;
    }
    #start-btn:hover { background: #2a4d75; }
    #start-btn:active { background: #152a42; }
    /* ── unit info box ── */
    #unit-info {
      display: none;
      position: fixed; bottom: calc(clamp(90px, 15vh, 140px) + 8px); right: 10px;
      min-width: 170px; padding: 8px 12px;
      border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
      font: 13px/1.7 monospace; color: #ffffff;
      z-index: 11; pointer-events: none;
      white-space: pre;
    }
    /* ── build dialog ── */
    .build-panel {
      background: #111827; border: 1px solid #334466; border-radius: 8px;
      width: 520px; max-width: 95vw; color: #ddeeff;
      display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .build-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid #334466; font: bold 15px sans-serif;
    }
    .build-close {
      background: none; border: none; color: #aabbcc; font-size: 22px;
      cursor: pointer; line-height: 1; padding: 0 4px;
    }
    .build-close:hover { color: #ffffff; }
    .build-body { display: flex; min-height: 240px; }
    .build-list {
      list-style: none; width: 190px; border-right: 1px solid #334466;
      overflow-y: auto; padding: 8px 0; flex-shrink: 0;
    }
    .build-list li {
      padding: 9px 16px; cursor: pointer; display: flex;
      justify-content: space-between; align-items: center;
      font: 14px/1 monospace; gap: 8px;
    }
    .build-list li .bl-cost { color: #7799bb; font-size: 12px; }
    .build-list li:hover:not(.bl-disabled) { background: rgba(255,255,255,0.07); }
    .build-list li.bl-selected { background: rgba(51,102,238,0.28); border-left: 3px solid #3366ee; padding-left: 13px; }
    .build-list li.bl-disabled { color: #445566; cursor: not-allowed; }
    .build-detail {
      flex: 1; padding: 16px; display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .build-portrait { display: block; border-radius: 50%; }
    .build-stats {
      font: 13px/1.8 monospace; color: #ddeeff;
      text-align: left; width: 100%; white-space: pre;
    }
    .build-footer {
      padding: 12px 16px; display: flex; justify-content: flex-end;
      border-top: 1px solid #334466;
    }
    .build-btn {
      padding: 9px 28px; font: bold 14px sans-serif;
      background: #1e3a5a; color: #ddeeff; border: 1px solid #5577aa;
      border-radius: 5px; cursor: pointer;
    }
    .build-btn:hover:not(:disabled) { background: #2a4d75; }
    .build-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    /* ── event ticker ── */
    #ticker {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: clamp(90px, 15vh, 140px); background: rgba(10,12,24,0.92);
      border-top: 1px solid #334466;
      overflow-y: auto; z-index: 10;
      font: clamp(11px, 1.2vw, 13px)/1.6 monospace; padding: 6px 10px;
      display: flex; flex-direction: column-reverse;
      color: #ddeeff;
    }
    #ticker .t-line { white-space: pre; }
    #ticker .t-sep { border-top: 1px solid #334466; margin: 3px 0; }
    /* ── lobby ── */
    #lby-panel { min-width: 340px; max-width: 460px; width: 100%; display: flex; flex-direction: column; gap: 0; }
    .lby-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .lby-label { font-size: 11px; color: #7799bb; text-transform: uppercase; letter-spacing: .06em; }
    .lby-input {
      background: rgba(255,255,255,0.07); border: 1px solid #334466;
      color: #ddeeff; font: 15px sans-serif; padding: 7px 10px; border-radius: 4px;
      outline: none; width: 100%;
    }
    .lby-input:focus { border-color: #5577aa; }
    .lby-btns { display: flex; gap: 8px; margin-top: 4px; }
    .lby-btn {
      flex: 1; padding: 9px 16px; font: bold 14px sans-serif;
      background: #1e3a5a; color: #ddeeff; border: 1px solid #5577aa;
      border-radius: 5px; cursor: pointer;
    }
    .lby-btn:hover:not(:disabled) { background: #2a4d75; }
    .lby-btn:disabled { opacity: .35; cursor: not-allowed; }
    .lby-btn-sm {
      padding: 6px 14px; font: 13px sans-serif;
      background: rgba(255,255,255,0.06); color: #aabbcc;
      border: 1px solid #334466; border-radius: 4px; cursor: pointer;
    }
    .lby-btn-sm:hover { background: rgba(255,255,255,0.1); }
    .lby-games-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; color: #7799bb; }
    .lby-game-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .lby-game-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; background: rgba(255,255,255,0.04); border-radius: 4px; border: 1px solid #2a3a52; }
    .lby-game-info { display: flex; gap: 8px; align-items: center; font-size: 13px; min-width: 0; }
    .lby-g-map { color: #ddeeff; }
    .lby-g-status { font-size: 11px; padding: 1px 6px; border-radius: 3px; }
    .lby-g-status.waiting { background: #2a4d1a; color: #88cc66; }
    .lby-g-status.active  { background: #1a2f6e; color: #5588ff; }
    .lby-g-status.ended   { background: #2a2a2a; color: #667788; }
    .lby-g-id { color: #556677; font: 11px monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
    .lby-g-mine { font-size: 11px; color: #5588ff; background: rgba(51,102,238,0.2); padding: 1px 6px; border-radius: 3px; }
    .lby-empty { color: #445566; font-size: 13px; padding: 14px; text-align: center; }
    .lby-gid { display: block; font: 13px monospace; background: rgba(255,255,255,0.07); border: 1px solid #334466; padding: 8px 12px; border-radius: 4px; word-break: break-all; color: #aaccff; }
    .lby-status-msg { min-height: 18px; font-size: 12px; color: #88aabb; margin-top: 8px; }
    .lby-status-msg.err { color: #ff7777; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="unit-info"></div>
  <div id="ticker"></div>

  <!-- Build dialog -->
  <div id="build-dialog" class="overlay">
    <div class="build-panel" id="build-panel">
      <div class="build-header">
        <span>Build at Facility</span>
        <button class="build-close" id="build-close-btn" title="Close">×</button>
      </div>
      <div class="build-body">
        <ul class="build-list" id="build-list"></ul>
        <div class="build-detail" id="build-detail">
          <canvas class="build-portrait" id="build-portrait" width="80" height="80"></canvas>
          <div class="build-stats" id="build-stats"></div>
        </div>
      </div>
      <div class="build-footer">
        <button class="build-btn" id="build-confirm-btn" disabled>Build</button>
      </div>
    </div>
  </div>

  <div id="hud">
    <div id="turn-display">Turn 1 — Player 1</div>
    <div id="load-display">
      <div class="p1" id="load-p1">Load: —</div>
      <div class="p2" id="load-p2">Load: —</div>
    </div>
    <button id="end-turn-btn">End Turn</button>
    <a id="manual-btn" href="manual.html" target="_blank" title="Open manual">?</a>
  </div>

  <!-- Game-over overlay -->
  <div id="game-over" class="overlay">
    <h2 id="winner-text"></h2>
    <button id="back-btn" class="ng-back">Back to Menu</button>
  </div>

  <!-- New-game screen (shown at startup and after game ends) -->
  <div id="new-game" class="overlay visible">
    <h1>Area Tactics</h1>

    <div class="ng-panel">
      <h3>Mode</h3>
      <div class="map-option">
        <input type="radio" name="mode" id="mode-hvh" value="hvh" checked />
        <label for="mode-hvh">Human vs Human (local)</label>
      </div>
      <div class="map-option">
        <input type="radio" name="mode" id="mode-hva" value="hva" />
        <label for="mode-hva">Human vs AI</label>
      </div>
      <div class="map-option">
        <input type="radio" name="mode" id="mode-online" value="online" />
        <label for="mode-online">Online Multiplayer</label>
      </div>
    </div>

    <div class="ng-panel">
      <h3>Map</h3>
      <div id="map-options"><!-- populated by JS --></div>
    </div>

    <div class="ng-panel">
      <h3>Features</h3>
      <div class="feature-option">
        <input type="checkbox" id="f-support" checked />
        <label for="f-support">Support</label>
      </div>
      <div class="feature-option">
        <input type="checkbox" id="f-claiming" checked disabled />
        <label for="f-claiming">Claiming</label>
        <span class="feature-tag">always on</span>
      </div>
      <div class="feature-option">
        <input type="checkbox" id="f-flanking" checked />
        <label for="f-flanking">Flanking</label>
      </div>
      <div class="feature-option disabled">
        <input type="checkbox" id="f-visibility" disabled />
        <label for="f-visibility">Visibility</label>
        <span class="feature-tag">coming soon</span>
      </div>
    </div>

    <button id="start-btn">Start Game</button>
  </div>

  <script src="/config.js"></script>
  <script type="module" src="/src/main.ts"></script>

  <!-- Online lobby overlay -->
  <div id="lobby" class="overlay" style="z-index:25">
    <div class="ng-panel" id="lby-panel">
      <h3>ONLINE MULTIPLAYER</h3>

      <!-- Auth section -->
      <div id="lby-auth">
        <div class="lby-field">
          <label class="lby-label">Server URL</label>
          <input id="lby-url" type="text" class="lby-input" />
        </div>
        <div class="lby-field">
          <label class="lby-label">Username</label>
          <input id="lby-user" type="text" class="lby-input" autocomplete="username" />
        </div>
        <div class="lby-field">
          <label class="lby-label">Password</label>
          <input id="lby-pass" type="password" class="lby-input" autocomplete="current-password" />
        </div>
        <div class="lby-btns">
          <button id="lby-login-btn" class="lby-btn">Login</button>
          <button id="lby-register-btn" class="lby-btn">Register</button>
        </div>
      </div>

      <!-- Game list section -->
      <div id="lby-games" style="display:none">
        <div class="lby-games-hdr">
          <span>Games</span>
          <button id="lby-refresh-btn" class="lby-btn-sm">↻ Refresh</button>
        </div>
        <div id="lby-game-list" class="lby-game-list"></div>
        <button id="lby-new-game-btn" class="lby-btn" style="width:100%;margin-top:10px">+ New Game</button>
      </div>

      <!-- Create game section -->
      <div id="lby-create" style="display:none">
        <h3 style="margin-bottom:8px">Map</h3>
        <div id="lby-map-opts"></div>
        <h3 style="margin-top:12px;margin-bottom:8px">Features</h3>
        <div class="feature-option">
          <input type="checkbox" id="lby-f-support" checked />
          <label for="lby-f-support">Support</label>
        </div>
        <div class="feature-option">
          <input type="checkbox" id="lby-f-flanking" />
          <label for="lby-f-flanking">Flanking</label>
        </div>
        <div class="lby-btns" style="margin-top:14px">
          <button id="lby-create-confirm" class="lby-btn">Create</button>
          <button id="lby-create-back" class="lby-btn-sm">Back</button>
        </div>
      </div>

      <!-- Waiting for opponent section -->
      <div id="lby-waiting" style="display:none">
        <p style="color:#aabbcc;margin-bottom:12px">Waiting for opponent to join…</p>
        <p class="lby-label" style="margin-bottom:6px">Share this game ID with your opponent:</p>
        <code id="lby-gid-text" class="lby-gid"></code>
        <button id="lby-copy-btn" class="lby-btn-sm" style="margin-top:8px">Copy ID</button>
      </div>

      <div id="lby-status" class="lby-status-msg"></div>
      <button id="lby-back-btn" class="lby-btn-sm" style="margin-top:6px;opacity:0.6">← Back to Menu</button>
    </div>
  </div>
</body>
</html>
